<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Rounded black square background -->
  <rect width="100" height="100" rx="20" fill="#0d1f2d"/>

  <!-- React atom icon in white -->
  <g transform="translate(50, 50)">
    <!-- Center dot -->
    <circle cx="0" cy="0" r="4" fill="#ffffff"/>

    <!-- Three elliptical orbits -->
    <ellipse cx="0" cy="0" rx="30" ry="12" fill="none" stroke="#ffffff" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="30" ry="12" fill="none" stroke="#ffffff" stroke-width="2" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="30" ry="12" fill="none" stroke="#ffffff" stroke-width="2" transform="rotate(-60)"/>
  </g>
</svg>
